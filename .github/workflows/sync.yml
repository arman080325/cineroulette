name: Sync catalog

on:
  schedule:
    # Section 19 Coverage requirement: "catalog refreshed at least daily"
    - cron: "0 6 * * *" # 06:00 UTC daily
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab too

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run db:generate
      - run: npm run sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
          SYNC_PAGES_PER_RUN: "5"
          SYNC_PAGES_PER_LANGUAGE: "3"
          SYNC_LANGUAGES: "en,hi,ko,ja,fr,es,de,it,zh,tr,pt,ru"
          SYNC_CONCURRENCY: "8"